name: Profile Metrics

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Overview
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: vvv214
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/New_York

      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: vvv214
          base: ""
          config_timezone: America/New_York
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_other: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage

      - name: Featured Repositories
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.repositories.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: vvv214
          base: ""
          plugin_repositories: yes
          plugin_repositories_forks: yes
          plugin_repositories_featured: vvv214/LDP_Protocols, vvv214/codex-connector, vvv214/s25-dataprivacy, vvv214/f23-cybersecprivacy, vvv214/CSrankings, vvv214/mbi

      - name: Full Contribution Calendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.calendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: vvv214
          base: ""
          plugin_calendar: yes
          plugin_calendar_limit: 0
